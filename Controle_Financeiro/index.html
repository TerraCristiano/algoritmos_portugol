<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Controle Financeiro</title>
</head>
<body>


    <form id="form-financeiro">
        
        <h1>Controle Financeiro</h1>

        <!--Seleção do tipo de registro-->

        <label for="tipo">Tipo: </label>
        <select name="tipo" id="tipo" onchange="alternarCategorias()" required>
            <option value="" disabled selected>Selecione...</option>
            <option value="entrada">Entrada (+)</option>
            <option value="saida">Saída (-)</option>
        </select>

        <!--Categoria-->

        <label for="categoria">Categoria: </label>
        <select name="categoria" id="categoria" disabled>
            <option value="">Selecione a movimentação desejada</option>
        </select>

        <label for="valor">Valor: </label>
        <input type="number" name="valor" id="valor" step="0.01" placeholder="Digite o valor" required>


        <label for="data">Data: </label>
        <input type="date" id="data" name="data" required>

        <label for="hora">Hora: </label>
        <input type="time" id="hora" name="hora" required>

        <button type="submit">Salvar</button>

    </form>
    <script src="js/script.js"></script>
</body>
</html>
